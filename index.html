<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Live meeting cost calculator — mobile-first, offline, zero backend.">
  <title>Meeting Cost</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f172a'/%3E%3Ctext x='50%25' y='54%25' font-size='40' text-anchor='middle' fill='%2338bdf8' font-family='system-ui' font-weight='700'%3E%24%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <!-- Main view: role selection -->
    <section id="view-main" class="view" aria-labelledby="title-main">
      <header class="app-header">
        <h1 id="title-main">Meeting Cost</h1>
        <button id="btn-open-settings" class="icon-btn" type="button" aria-label="Open settings">⚙</button>
      </header>

      <ul id="role-list" class="role-list" aria-label="Roles">
        <!-- Role tiles rendered by JS -->
      </ul>

      <div class="totals" aria-live="polite">
        <div class="totals-row">
          <span class="totals-label">Participants</span>
          <span id="total-participants" class="totals-value">0</span>
        </div>
        <div class="totals-row">
          <span class="totals-label">Total / hour</span>
          <span id="total-hourly-rate" class="totals-value">0</span>
        </div>
      </div>

      <div class="sticky-footer">
        <button id="btn-start" class="primary-btn" type="button" disabled>Start</button>
      </div>
    </section>

    <!-- Active meeting view -->
    <section id="view-active" class="view hidden" aria-labelledby="title-active">
      <h2 id="title-active" class="visually-hidden">Active meeting</h2>

      <div class="cost-display" aria-live="polite">
        <span class="cost-label">Meeting cost</span>
        <strong id="cost-value" class="cost-value">0</strong>
      </div>

      <div class="timer-display" aria-live="off">
        <span id="timer-value" class="timer-value">00:00</span>
      </div>

      <div class="mini-stats">
        <div class="mini-stat">
          <span class="mini-stat-label">People</span>
          <span id="mini-participants" class="mini-stat-value">0</span>
        </div>
        <div class="mini-stat">
          <span class="mini-stat-label">Per hour</span>
          <span id="mini-hourly" class="mini-stat-value">0</span>
        </div>
      </div>

      <div class="active-controls">
        <button id="btn-pause-resume" class="primary-btn" type="button">Pause</button>
        <button id="btn-reset" class="secondary-btn" type="button">Reset</button>
      </div>
    </section>

    <!-- Settings view -->
    <section id="view-settings" class="view hidden" aria-labelledby="title-settings">
      <header class="app-header">
        <button id="btn-close-settings" class="icon-btn" type="button" aria-label="Back">←</button>
        <h2 id="title-settings">Settings</h2>
        <span class="icon-btn-placeholder" aria-hidden="true"></span>
      </header>

      <form id="settings-form" class="settings-form" novalidate>
        <fieldset class="settings-section">
          <legend>Currency</legend>
          <label class="select-label">
            <select id="currency-select" name="currency">
              <option value="PLN">PLN — Polski złoty</option>
              <option value="EUR">EUR — Euro</option>
              <option value="USD">USD — US Dollar</option>
            </select>
          </label>
        </fieldset>

        <fieldset class="settings-section">
          <legend>Roles</legend>
          <ul id="roles-editor" class="roles-editor">
            <!-- Rendered by JS -->
          </ul>
        </fieldset>

        <div class="settings-actions">
          <button id="btn-save-settings" class="primary-btn" type="submit">Save</button>
          <button id="btn-restore-defaults" class="secondary-btn" type="button">Restore defaults</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
